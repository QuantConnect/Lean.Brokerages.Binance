name: Build & Test

on:
  push:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    container:
        image: quantconnect/lean:foundation
        options: --cpus 12 --memory 12g
        env:
          QC_BINANCE_API_KEY: ${{ secrets.QC_BINANCE_API_KEY }}
          QC_BINANCE_API_SECRET: ${{ secrets.QC_BINANCE_API_SECRET }}
          QC_BINANCEUS_API_KEY: ${{ secrets.QC_BINANCEUS_API_KEY }}
          QC_BINANCEUS_API_SECRET: ${{ secrets.QC_BINANCEUS_API_SECRET }}
          QC_JOB_USER_ID: ${{ secrets.QC_JOB_USER_ID }}
          QC_API_ACCESS_TOKEN: ${{ secrets.QC_API_ACCESS_TOKEN }}
          QC_JOB_ORGANIZATION_ID: ${{ secrets.QC_JOB_ORGANIZATION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Checkout Lean Same Branch
        id: lean-same-branch
        uses: actions/checkout@v2
        continue-on-error: true
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          repository: QuantConnect/Lean
          path: Lean

      - name: Checkout Lean Master
        if: steps.lean-same-branch.outcome != 'success'
        uses: actions/checkout@v2
        with:
          repository: QuantConnect/Lean
          path: Lean

      - name: Move Lean
        run: mv Lean ../Lean

      - name: Run build and tests
        run: |
          # name: Build
          dotnet build /p:Configuration=Release /v:quiet /p:WarningLevel=1 QuantConnect.BinanceBrokerage.sln && \
          # name: Run Tests
          dotnet test ./QuantConnect.BinanceBrokerage.Tests/bin/Release/QuantConnect.Brokerages.Binance.Tests.dll

